import java.util.function.Consumer

interface JfxTarget {

    File prepareDirectory();

    String queryApplicationClass();

    boolean runWithinGradle();

    boolean includeProject();

    boolean requiresLauncher();

    default String getIncludedProjectRunTask() {
        return null
    }
}

ext {
    availableTargets = new HashMap<String, JfxTarget>()
    availableTargetsJvmArgs = new HashMap<String, List<String>>()
    availableTargetsCustomRun = new HashMap<String, Closure>()

    configuredTarget = null
    configuredTargetJvmArgs = []
    configuredTargetCustomRun = null
}

def getPackage(String content) {
    def pkg = null
    for (final def line in content.lines().toList()) {
        if (line.startsWith("package")) {
            pkg = line.split(" ")[1].trim().split(";")[0]
            break
        }
    }
    return pkg
}

def sourceFile(String path) {
    configuredTarget = new JfxTarget() {

        @Override
        File prepareDirectory() {
            return file("$rootDir/src/main/java")
        }

        @Override
        String queryApplicationClass() {
            return path
        }

        @Override
        boolean runWithinGradle() {
            return true;
        }

        @Override
        boolean includeProject() {
            return false
        }

        @Override
        boolean requiresLauncher() {
            def sourceText = file("$rootDir/src/main/java/${path.replaceAll("\\.", "")}.java").text
            def isApplication = sourceText.contains("extends Application")
            return isApplication
        }
    }
}

def externalFile(File external) {
    if (!external.isFile()) {
        throw new IllegalArgumentException("Unable to find external file $external")
    }

    configuredTarget = new JfxTarget() {

        @Override
        File prepareDirectory() {
            def content = external.text
            def pkg = getPackage(content)
            def base = external.toString().substring(0, external.toString().length() - (pkg.length() + 1 + external.name.length()))
            return file(base)
        }

        @Override
        String queryApplicationClass() {
            def content = external.text
            def pkg = getPackage(content)
            return pkg + "." + external.name.take(external.name.lastIndexOf('.'))
        }

        @Override
        boolean runWithinGradle() {
            return true;
        }

        @Override
        boolean includeProject() {
            return false
        }

        @Override
        boolean requiresLauncher() {
            return true
        }
    }
}

def externalSourceDirectory(File dir, String mainClass) {
    if (!dir.isDirectory()) {
        throw new IllegalArgumentException("Unable to find external directory $dir")
    }

    configuredTarget = new JfxTarget() {

        @Override
        File prepareDirectory() {
            return dir
        }

        @Override
        String queryApplicationClass() {
            return mainClass
        }

        @Override
        boolean runWithinGradle() {
            return true;
        }

        @Override
        boolean includeProject() {
            return false
        }

        @Override
        boolean requiresLauncher() {
            def sourceText = file("$dir/${path.replaceAll("\\.", "")}.java").text
            def isApplication = sourceText.contains("extends Application")
            return isApplication
        }
    }
}

def externalGradleProject(File dir, String runTask) {
    if (!dir.isDirectory()) {
        throw new IllegalArgumentException("Unable to find external directory $dir")
    }

    configuredTarget = new JfxTarget() {

        @Override
        File prepareDirectory() {
            return dir
        }

        @Override
        String queryApplicationClass() {
            return null
        }

        @Override
        boolean runWithinGradle() {
            return false
        }

        @Override
        boolean includeProject() {
            return true
        }

        @Override
        boolean requiresLauncher() {
            return false
        }

        @Override
        String getIncludedProjectRunTask() {
            return runTask
        }
    }
}

def urlFile(String url) {
    if (url.startsWith("https://github.com/")) {
        url = url.replace("https://github.com", "https://raw.githubusercontent.com")
        url = url.replace("/blob/", "/refs/heads/")
    }

    def parsedUrl = URI.create(url).toURL()
    def name = parsedUrl.getPath().split("/").last().split("\\.").first()
    configuredTarget = new JfxTarget() {

        @Override
        File prepareDirectory() {
            def tempFile = file("${System.getProperty("java.io.tmpdir")}/$name")
            parsedUrl.withInputStream{ i -> tempFile.withOutputStream{ it << i }}
            def tempContent = tempFile.text

            def pkg = getPackage(tempContent)
            def pkgDirs = pkg != null ? pkg.replaceAll("\\.", "/") : ""

            def sourceFile = file("$rootDir/src/generated/java/$pkgDirs/${name}.java")
            sourceFile.parentFile.mkdirs()
            if (inInitialization) {
                println("Download file from $url to to $sourceFile")
                parsedUrl.withInputStream { i -> sourceFile.withOutputStream { it << i } }
            }
            return file("$rootDir/src/generated/java")
        }

        @Override
        String queryApplicationClass() {
            def tempFile = file("${System.getProperty("java.io.tmpdir")}/$name")
            parsedUrl.withInputStream{ i -> tempFile.withOutputStream{ it << i }}
            def tempContent = tempFile.text

            def pkg = getPackage(tempContent)
            return pkg + "." + name
        }

        @Override
        boolean runWithinGradle() {
            return true;
        }

        @Override
        boolean includeProject() {
            return false
        }

        @Override
        boolean requiresLauncher() {
            return true
        }
    }
}

def customExec(Closure c) {
    configuredTargetCustomRun = c
}

def jvmArgs(String... props) {
    configuredTargetJvmArgs += props.toList()
}

def target(String name, Closure c) {
    c.run()

    availableTargets.put(name, configuredTarget)
    availableTargetsJvmArgs.put(name, configuredTargetJvmArgs)
    availableTargetsCustomRun.put(name, configuredTargetCustomRun)

    configuredTarget = null
    configuredTargetJvmArgs = []
    configuredTargetCustomRun = null
}

ext {
    sourceFile = this.&sourceFile
    externalFile = this.&externalFile
    externalSourceDirectory = this.&externalSourceDirectory
    externalGradleProject = this.&externalGradleProject
    urlFile = this.&urlFile
    jvmArgs = this.&jvmArgs
    customExec = this.&customExec
    target = this.&target
}
