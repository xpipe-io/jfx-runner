/**
 * This method is needed as the standard gradle ExecOperations service requires a project,
 * which is not available during the initialization phase of the settings file
 */
def exec(File dir, boolean fail, String... args) {
    def joined = String.join(" ", args)
    println("Running $joined in $dir")
    def proc = new ProcessBuilder(args).directory(dir).start()
    def stdout = new Thread() {
        @Override
        void run() {
            proc.getInputStream().transferTo(System.out)
        }
    }
    stdout.start()
    def stderr = new Thread() {
        @Override
        void run() {
            proc.getErrorStream().transferTo(System.err)
        }
    }
    stderr.start()
    proc.waitFor()
    stdout.join()
    stderr.join()
    if (fail && proc.exitValue() != 0) {
        throw new IOException("Command $joined failed")
    }
}

ext {
    exec = this.&exec
}

def checkoutGit(String repo, String ref) {
    def uri = URI.create(repo)
    def name = uri.getPath()
    def tempDir = file("${System.getProperty("java.io.tmpdir")}/jfx-runner/$name")
    tempDir.mkdirs()
    if (inInitialization) {
        println("Cloning into directory " + tempDir + " ...")
        if (tempDir.listFiles().size() == 0) {
            exec(null, true, "git", "clone", "--recurse-submodules", "--depth=10", repo, tempDir.toString())
        }
        exec(tempDir, true, "git", "checkout", ref)
        exec(tempDir, true, "git", "pull", "--recurse-submodules", "--depth=10", "origin", ref)
        exec(tempDir, true, "git", "checkout", ref)
    }
    return tempDir
}

ext {
    checkoutGit = this.&checkoutGit
}
