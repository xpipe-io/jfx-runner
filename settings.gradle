import java.util.stream.Collectors

rootProject.name = 'jfx-runner'

ext {
    inInitialization = true
}

apply from: "$rootDir/gradle/props.gradle"

// Update JavaFX gradle.properties file with current build properties
def propertiesFile = file("$jfxDir/gradle.properties")
def originalPropertiesText = propertiesFile.exists() ? propertiesFile.text : ""
def autogenIndex = originalPropertiesText.indexOf("# Autogenerated by jfx-runner")
originalPropertiesText = autogenIndex != -1 ? originalPropertiesText.substring(0, autogenIndex) : originalPropertiesText

if (!jfxBuildProperties.isEmpty()) {
    // Append
    propertiesFile.text = (!originalPropertiesText.isBlank() ? "\n\n" : "") + "# Autogenerated by jfx-runner\n" + jfxBuildProperties.stream().map { prop ->
        def split = prop.split("=", 2)
        println("Setting property -P${split[0]}=${split[1]}")
        return prop
    }.collect(Collectors.joining("\n")) + "\n"
} else if (autogenIndex != -1) {
    propertiesFile.text = originalPropertiesText
}

if (activeTarget.includeProject()) {
    // Fixes for windows 8.3 paths, see https://stackoverflow.com/questions/78185995/missing-externalproject-for
    includeBuild(activeTargetDir.toPath().toRealPath().toAbsolutePath().toString())
}

// Fixes for windows 8.3 paths, see https://stackoverflow.com/questions/78185995/missing-externalproject-for
includeBuild(jfxDir.toPath().toRealPath().toAbsolutePath().toString()) {
    dependencySubstitution {
        // Make gradle replace all declared JavaFX dependencies with locally built ones
        // See https://docs.gradle.org/current/userguide/composite_builds.html
        for (def mod in jfxModules.entrySet()) {
            substitute module("org.openjfx:${mod.key.replaceAll("\\.", "-")}") using project(":$mod.value")
        }
    }
}
