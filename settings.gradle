import java.util.stream.Collectors

rootProject.name = 'jfx-runner'

apply from: "$rootDir/gradle/props.gradle"

def propertiesFile = file("$jfxDir/gradle.properties")
def propertiesText = propertiesFile.exists() ? propertiesFile.text : ""
def autogenIndex = propertiesText.indexOf("# Autogenerated by jfx-runner")
propertiesText = autogenIndex != -1 ? propertiesText.substring(0, autogenIndex) : propertiesText

if (!jfxBuildProperties.isEmpty()) {
    propertiesFile.text = (!propertiesText.isBlank() ? "\n\n" : "") + "# Autogenerated by jfx-runner\n" + jfxBuildProperties.stream().map { prop ->
        def split = prop.split("=", 2)
        println("Setting property -P${split[0]}=${split[1]}")
        return prop
    }.collect(Collectors.joining("\n")) + "\n"
} else if (autogenIndex != -1) {
    propertiesFile.text = propertiesText
}

println("Including JavaFX project from " + jfxDir)

// Fixes for windows 8.3 paths, see https://stackoverflow.com/questions/78185995/missing-externalproject-for
includeBuild(jfxDir.toPath().toRealPath().toAbsolutePath().toString()) {
    dependencySubstitution {
        for (def mod in jfxModules.entrySet()) {
            substitute module("org.openjfx:${mod.key.replaceAll("\\.", "-")}") using project(":$mod.value") withoutArtifactSelectors()
        }
    }
}

if (configuredTarget.includeProject()) {
    def dir = configuredTarget.prepareDirectory()
    includeBuild(dir)
}
