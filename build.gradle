plugins {
    id 'java'
    id 'application'
}

apply from: "props.gradle"

repositories {
    mavenCentral()
}

clean {
    dependsOn(gradle.includedBuild('jfx').task(":clean"))
}

def targetDir = configuredTarget.prepareDirectory()

if (configuredTarget.includeProject()) {
    def projectName = targetDir.name
    def task = configuredTarget.getIncludedProjectRunTask()
    if (task != null) {
        run {
            actions.clear()
            dependsOn(gradle.includedBuild(projectName).task(task))
        }
        clean {
            dependsOn(gradle.includedBuild(projectName).task(":clean"))
        }
    }
}

// TODO: Run this at the proper time
for (def mod in jfxModules.entrySet()) {
    copy {
        from "$jfxDir/build/publications/${mod.key}-win.jar"
        into "$jfxDir/modules/${mod.key}/build/libs/"
        rename "${mod.key}-win.jar", "${mod.value}.jar"
    }
}

if (configuredTargetCustomRun == null && !configuredTarget.includeProject() && targetDir != null && targetDir.exists()) {
    println("Applying external source set dir $targetDir")
    sourceSets {
        main {
            java {
                srcDir(targetDir)
            }
        }
    }
} else {
    sourceSets {
        main {
            java {
                srcDirs = []
            }
        }
    }
}

if (configuredTargetCustomRun == null && configuredTarget.runWithinGradle()) {
    dependencies {
        for (def mod in jfxModules.entrySet()) {
            implementation ("org.openjfx:${mod.key.replaceAll("\\.", "-")}")
            implementation files("$jfxDir/build/sdk/lib/${mod.key}.jar")
        }
    }

    application {
        mainClass = configuredTarget.queryApplicationClass()
        applicationDefaultJvmArgs = targetJvmArgs

        println()
        println("Running target with gradle application plugin")
        println("Target main class: ${mainClass.get()}")
        println("Target JVM args: $applicationDefaultJvmArgs")
    }
}

else if (configuredTargetCustomRun != null) {
    run {
        actions.clear()
        doLast {
            println("Running custom exec")
            configuredTargetCustomRun(targetDir, jfxDir)
        }
    }
}
