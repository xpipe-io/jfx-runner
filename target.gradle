interface JfxTarget {

    void prepare();

    String queryApplicationClass();
}

ext {
    configuredTargetName = null;
    configuredTarget = null
    configuredTargetTask = null;
    configuredTargetJvmArgs = []
}

def sourceFile(String path) {
    configuredTargetName = path
    configuredTarget = new JfxTarget() {

        @Override
        void prepare() {}

        @Override
        String queryApplicationClass() {
            return path
        }
    }
}

def externalFile(File file) {
    configuredTargetName = file.name
    configuredTarget = new JfxTarget() {

        @Override
        void prepare() {
            def dir = layout.buildDirectory.dir("generated/sources/$file.name/main/java").get()
            println("Creating source set dir " + dir + " for external source " + file)
            copy {
                from(file)
                into(dir)
            }
        }

        @Override
        String queryApplicationClass() {
            return file.name
        }
    }
}

def url(String url) {
    def parsedUrl = URI.create(url).toURL()
    def name = parsedUrl.getPath().split("/").last().split("\\.").first()
    configuredTargetName = name
    configuredTarget = new JfxTarget() {

        @Override
        void prepare() {
            def file = layout.buildDirectory.dir("generated/sources/$name/main/java").get().file("${name}.java")
            println("Download file from $url to to $file")
            parsedUrl.withInputStream{ i -> file.withOutputStream{ it << i }}
        }

        @Override
        String queryApplicationClass() {
            return name
        }
    }
}

def jvmArgs(String... props) {
    configuredTargetJvmArgs += props.toList()
}

def target(Closure c) {
    c.run()
}

ext {
    sourceFile = this.&sourceFile
    externalFile = this.&externalFile
    jvmArgs = this.&jvmArgs
    target = this.&target
}
