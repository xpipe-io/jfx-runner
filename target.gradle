interface JfxTarget {

    void prepare();

    String queryApplicationClass();
}

ext {
    configuredTargetName = null;
    configuredTarget = null
    configuredTargetTask = null;
    configuredTargetJvmArgs = []
}

def sourceFile(String path) {
    configuredTarget = new JfxTarget() {

        @Override
        void prepare() {}

        @Override
        String queryApplicationClass() {
            return path
        }
    }
}

def externalFile(File file) {
    configuredTarget = new JfxTarget() {

        @Override
        void prepare() {
            copy {
                from(file)
                into(layout.buildDirectory.dir("generated/sources/$configuredTargetName/main/java"))
            }
        }

        @Override
        String queryApplicationClass() {
            return file.name
        }
    }
}

def exec(File dir, String... args) {
    def proc = new ProcessBuilder(args).directory(dir).start()
    new Thread() {
        @Override
        void run() {
            proc.getInputStream().transferTo(System.out)
        }
    }.start()
    new Thread() {
        @Override
        void run() {
            proc.getErrorStream().transferTo(System.err)
        }
    }.start()
    proc.waitFor()
    if (proc.exitValue() != 0) {
        throw new IOException("Command failed")
    }
}

def gradleTask(String identifier) {
    configuredTargetTask = identifier
}

def jvmArgs(String... props) {
    configuredTargetJvmArgs += props.toList()
}

def target(String name, Closure c) {
    configuredTargetName = name
    c.run()
}

ext {
    sourceFile = this.&sourceFile
    externalFile = this.&externalFile
    jvmArgs = this.&jvmArgs
    target = this.&target
    gradleTask = this.&gradleTask
}
